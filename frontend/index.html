<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluentKeys — Free Typing Test &amp; WPM Trainer</title>
    <meta
      name="description"
      content="FluentKeys is a free typing test and adaptive trainer. Check your WPM and accuracy, then practice smarter — it biases words toward your weakest keys. No sign-up needed."
    />
    <link rel="canonical" href="https://fluentkeys.com/" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FluentKeys" />
    <meta property="og:title" content="FluentKeys — Free Typing Test &amp; WPM Trainer" />
    <meta
      property="og:description"
      content="A free typing test and adaptive trainer that biases practice toward your weakest keys. Check your WPM and accuracy — no sign-up needed."
    />
    <meta property="og:url" content="https://fluentkeys.com/" />
    <meta name="twitter:card" content="summary" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "FluentKeys",
        "url": "https://fluentkeys.com/",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <!-- Selectable test fonts (applied to the typing box only). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Fira+Code:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Source+Code+Pro:wght@400;500&display=swap"
    />

    <script>
      // Hydrate preferences before first paint so there's no flash of the
      // default theme/font. Falls back to the legacy theme key if present.
      ;(function () {
        var fontStacks = {
          'roboto-mono': "'Roboto Mono', ui-monospace, monospace",
          'jetbrains-mono': "'JetBrains Mono', ui-monospace, monospace",
          'fira-code': "'Fira Code', ui-monospace, monospace",
          'ibm-plex-mono': "'IBM Plex Mono', ui-monospace, monospace",
          'source-code-pro': "'Source Code Pro', ui-monospace, monospace",
        }
        var prefs = {}
        try {
          // Signed-in prefs live in localStorage, anonymous in sessionStorage.
          var stored =
            localStorage.getItem('fluentkeys-preferences') ||
            sessionStorage.getItem('fluentkeys-preferences') ||
            '{}'
          prefs = JSON.parse(stored) || {}
        } catch (e) {}
        var legacyTheme = localStorage.getItem('fluentkeys-theme')
        var theme = prefs.theme || (legacyTheme === 'light' ? 'light' : 'dark')
        // Keep in sync with THEMES in src/lib/preferences.ts.
        var darkFamily = { dark: 1, coffee: 1, midnight: 1 }
        var validThemes = { light: 1, dark: 1, coffee: 1, cream: 1, midnight: 1, sunset: 1 }
        if (!validThemes[theme]) theme = 'dark'
        document.documentElement.dataset.theme = theme
        if (darkFamily[theme]) document.documentElement.classList.add('dark')
        document.documentElement.style.setProperty(
          '--font-test',
          fontStacks[prefs.font] || fontStacks['roboto-mono'],
        )
        if (prefs.language) document.documentElement.lang = prefs.language
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
