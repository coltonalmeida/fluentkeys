# Render Blueprint — backend + Postgres only.
# The frontend deploys to Vercel separately (Phase 8, pending domain purchase).
services:
  - type: web
    name: fluentkeys-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    # Migrations run before the server boots so the schema is always current.
    startCommand: npm run migrate:prod && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fluentkeys-db
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard (never committed):
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      # Deployed frontend origin(s), comma-separated. Set once the frontend
      # is live; until then the API allows all origins.
      - key: CORS_ORIGIN
        sync: false
      # Optional — leaderboard cache only; the app degrades to Postgres
      # without it. Point at a Render Key Value instance if you add one.
      - key: REDIS_URL
        sync: false

databases:
  - name: fluentkeys-db
    plan: free
