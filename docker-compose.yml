services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fluentkeys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluentkeys}
      POSTGRES_DB: ${POSTGRES_DB:-fluentkeys}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
